name: CI-CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  train:
    uses: ./.github/workflows/train.yml

  build-test:
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained model artifacts
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: 06-cicd/models

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t inventory-risk-api ./06-cicd

      - name: Run Docker container
        run: |
          docker run -d --name inventory-risk-container -p 5001:8000 inventory-risk-api
          sleep 10

      - name: Set up Python for tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 06-cicd/requirements.txt
          pip install pytest requests

      - name: Run API tests
        run: |
          cd 06-cicd
          pytest test_api.py -v