name: CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 03-experiment-tracking 04-deployment 05-monitoring 06-cicd --max-line-length=120 --ignore=E501,W504,E127,E241,F401,F841,E226,W292,W293,W391,E303

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
	uses: actions/checkout@v4
